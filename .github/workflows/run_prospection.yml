name: PROSPECCIÓN_AGENT - Lunes Búsqueda y Envío

on:
  schedule:
    - cron: '30 12 * * 1'   # Lunes 6:30 AM CST = 12:30 PM UTC
    - cron: '0 2 * * 2'     # Lunes 8:00 PM CST = 2:00 AM martes UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: search or send'
        required: true
        default: 'search'
        type: choice
        options:
          - search
          - send

jobs:
  prospection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              echo "mode=search" >> $GITHUB_OUTPUT
            else
              echo "mode=send" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Run prospection agent
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: python prospection_agent_v4.1_hybrid.py
