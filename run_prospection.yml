name: PROSPECCIÓN_AGENT - Martes 6:30 am

on:
  schedule:
    # Cada martes 6:30 am (UTC)
    # Formato: minuto hora día_mes mes día_semana
    # 30 6 * * 2 = martes 6:30 am
    - cron: '30 6 * * 2'
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  prospection:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ejecutar PROSPECCIÓN_AGENT v4.0
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: |
          python prospection_agent_v4.0.py
      
      - name: Notificar resultado
        if: always()
        run: |
          echo "Ejecución completada en: $(date)"
          echo "Estado del job: ${{ job.status }}"
